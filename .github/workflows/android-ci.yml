name: Android CI

on:
  push:
    branches: [ main, develop, release/* ]
    paths:
      - 'AlcedoAndroid/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'AlcedoAndroid/**'

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AlcedoAndroid
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: AlcedoAndroid/app/build/reports/lint-results-debug.html

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: AlcedoAndroid
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: AlcedoAndroid/app/build/reports/tests/testDebugUnitTest/

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: unit-tests
    defaults:
      run:
        working-directory: AlcedoAndroid
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: AlcedoAndroid/app/build/outputs/apk/debug/*.apk

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    defaults:
      run:
        working-directory: AlcedoAndroid
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ALCEDO_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore
        working-directory: AlcedoAndroid

      - name: Build Release APK
        env:
          ALCEDO_KEYSTORE_PATH: app/release.keystore
          ALCEDO_KEYSTORE_PASSWORD: ${{ secrets.ALCEDO_KEYSTORE_PASSWORD }}
          ALCEDO_KEY_ALIAS: ${{ secrets.ALCEDO_KEY_ALIAS }}
          ALCEDO_KEY_PASSWORD: ${{ secrets.ALCEDO_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: AlcedoAndroid/app/build/outputs/apk/release/*.apk

  native-check:
    name: Native Code Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AlcedoAndroid
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Check CMake Configuration
        run: ./gradlew :app:externalNativeBuildDebug --no-daemon || true
        # Allow failure as NDK may not be fully set up in CI; the important
        # thing is that CMakeLists.txt can be parsed
