name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build Release APK & Publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AlcedoAndroid
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ALCEDO_KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Build Release APK
        env:
          ALCEDO_KEYSTORE_PATH: release.keystore
          ALCEDO_KEYSTORE_PASSWORD: ${{ secrets.ALCEDO_KEYSTORE_PASSWORD }}
          ALCEDO_KEY_ALIAS: ${{ secrets.ALCEDO_KEY_ALIAS }}
          ALCEDO_KEY_PASSWORD: ${{ secrets.ALCEDO_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: AlcedoAndroid/app/build/outputs/apk/release/*.apk

      - name: Extract Version from Tag
        if: startsWith(github.ref, 'refs/tags/')
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Alcedo ${{ steps.get_version.outputs.VERSION }}
          files: AlcedoAndroid/app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
