name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.2.10)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AlcedoAndroid

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;26.3.11579264" "cmake;3.22.1"

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          ALCEDO_KEYSTORE_BASE64: ${{ secrets.ALCEDO_KEYSTORE_BASE64 }}
        run: |
          echo "$ALCEDO_KEYSTORE_BASE64" | base64 -d > app/release.keystore

      - name: Build Release APK
        env:
          ALCEDO_KEYSTORE_PATH: release.keystore
          ALCEDO_KEYSTORE_PASSWORD: ${{ secrets.ALCEDO_KEYSTORE_PASSWORD }}
          ALCEDO_KEY_ALIAS: ${{ secrets.ALCEDO_KEY_ALIAS }}
          ALCEDO_KEY_PASSWORD: ${{ secrets.ALCEDO_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        id: apk
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No APK found!"
            ls -laR app/build/outputs/apk/ 2>/dev/null || true
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi
          DEST="AlcedoStudio-${TAG}.apk"
          cp "$APK_PATH" "$DEST"
          echo "apk_path=$DEST" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "APK size: $(du -h "$DEST" | cut -f1)"

      - name: Generate Release Notes
        id: notes
        env:
          TAG: ${{ steps.apk.outputs.tag }}
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -A1 "$TAG" | tail -1)
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG" ]; then
            CHANGES=$(git log --oneline --no-merges "${PREV_TAG}..HEAD" 2>/dev/null || git log --oneline --no-merges -20)
          else
            CHANGES=$(git log --oneline --no-merges -20)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.apk.outputs.tag }}
          name: ${{ steps.apk.outputs.tag }}
          body: |
            ## 变更记录

            ```
            ${{ steps.notes.outputs.changes }}
            ```

            ---
            **APK**: `${{ steps.apk.outputs.apk_path }}`
          files: AlcedoAndroid/${{ steps.apk.outputs.apk_path }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(steps.apk.outputs.tag, 'beta') || contains(steps.apk.outputs.tag, 'alpha') || contains(steps.apk.outputs.tag, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
